name: Refresh ESPN airing UUIDs

on:
  schedule:
    # Every 2 hours — airings are per-day, so we refresh frequently enough
    # to catch games that ESPN adds/shifts during the day but not so often
    # we spam the picker endpoint.
    - cron: "0 */2 * * *"
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node scripts/scrape-espn-airings.mjs
      - name: Upload ESPN airings to R2
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npm install -g wrangler@latest
          wrangler r2 object put hidescore-data/espn-airings.json --file public/espn-airings.json --remote --content-type application/json
