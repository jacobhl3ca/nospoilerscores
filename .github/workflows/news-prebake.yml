name: Prebake news feeds

on:
  schedule:
    # Every hour — keeps deploy cap headroom; news doesn't need 30-min freshness.
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node scripts/prebake-news.mjs
        env:
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
      - name: Commit updated news feeds
        run: |
          git config user.name "Jacob HL"
          git config user.email "jacobhl3ca@gmail.com"
          if git diff --quiet public/news; then
            echo "no changes"
            exit 0
          fi
          git add public/news
          git commit -m "Refresh news feeds"
          git pull --rebase
          git push
