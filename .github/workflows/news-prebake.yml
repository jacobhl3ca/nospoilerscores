name: Prebake news feeds

on:
  schedule:
    # Every hour — keeps deploy cap headroom; news doesn't need 30-min freshness.
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      # Skip espn-top: GHA datacenter IPs get served an espn.com homepage
      # variant without the `headlineStack top-headlines` block, so the scrape
      # always misses. The residential-IP Mac mini cron owns this feed.
      - run: node scripts/prebake-news.mjs --skip=espn-top
        env:
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
      - name: Upload news feeds to R2
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npm install -g wrangler@latest
          for f in public/news/*.json; do
            wrangler r2 object put "hidescore-data/news/$(basename "$f")" --file "$f" --remote --content-type application/json
          done
