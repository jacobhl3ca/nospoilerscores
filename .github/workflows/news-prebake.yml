jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      # Skip espn-top + espn-videos: ESPN's CloudFront WAF challenges GHA
      # datacenter IPs (HTTP 202 + empty body, `x-amzn-waf-action: challenge`),
      # so any homepage scrape returns 0 items. The residential-IP Mac mini
      # cron owns both these feeds.
      - run: node scripts/prebake-news.mjs --skip=espn-top,espn-videos
        env:
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
      - name: Upload news feeds to R2
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npm install -g wrangler@^4
          for f in public/news/*.json; do
            for attempt in 1 2 3; do
              if wrangler r2 object put "hidescore-data/news/$(basename "$f")" --file "$f" --remote --content-type application/json; then
                break
              fi
              if [ "$attempt" = "3" ]; then
                echo "::error::wrangler upload failed 3x for $f"
                exit 1
              fi
              echo "wrangler attempt $attempt failed, retrying in $((attempt * 10))s..."
              sleep $((attempt * 10))
            done
          done
