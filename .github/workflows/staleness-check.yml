name: Check feed staleness + highlight fallbacks

on:
  schedule:
    # Hourly — catches Mac mini death, token revocation, R2 outage, silent
    # scrape regressions. Trimmed from */30 to stay under the Actions free cap.
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      # Treat pre-script GitHub infra failures (checkout 403s, setup-node hiccups)
      # as skips, not job failures — only the staleness script's exit code should
      # email. A sustained Actions outage will surface via the publishing workflows.
      - uses: actions/checkout@v4
        id: checkout
        continue-on-error: true
      - uses: actions/setup-node@v4
        id: setup
        if: steps.checkout.outcome == 'success'
        with:
          node-version: 22
        continue-on-error: true
      - if: steps.checkout.outcome == 'success' && steps.setup.outcome == 'success'
        run: node scripts/check-staleness.mjs
      # Folded in from the former standalone highlight-fallback-check.yml so it
      # costs 0 extra Actions minutes. Runs even if the staleness step failed
      # (as long as the infra steps succeeded) so both alerts stay independent.
      - if: ${{ !cancelled() && steps.checkout.outcome == 'success' && steps.setup.outcome == 'success' }}
        run: node scripts/check-highlight-fallbacks.mjs
