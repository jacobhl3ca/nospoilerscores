name: Refresh Big Inning schedule

on:
  schedule:
    # Twice daily — MLB updates the upcoming list as games are scheduled and
    # broadcasters confirm. 6am ET and 2pm ET catches morning/afternoon edits.
    - cron: "0 10 * * *"
    - cron: "0 18 * * *"
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node scripts/scrape-big-inning.mjs
      - name: Upload Big Inning schedule to R2
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npm install -g wrangler@latest
          wrangler r2 object put hidescore-data/big-inning-schedule.json --file public/big-inning-schedule.json --remote --content-type application/json
